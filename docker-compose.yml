services:
  postgres:
    image: postgres:16-alpine
    container_name: iedc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-iedc}
      POSTGRES_USER: ${POSTGRES_USER:-iedc_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Defina POSTGRES_PASSWORD no .env}
      TZ: ${TZ:-America/Sao_Paulo}
    volumes:
      - iedc_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-iedc_app} -d ${POSTGRES_DB:-iedc}"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres-albergue:
    image: postgres:16-alpine
    container_name: iedc-postgres-albergue
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_ALBERGUE_DB:-iedc_albergue}
      POSTGRES_USER: ${POSTGRES_ALBERGUE_USER:-iedc_albergue_app}
      POSTGRES_PASSWORD: ${POSTGRES_ALBERGUE_PASSWORD:?Defina POSTGRES_ALBERGUE_PASSWORD no .env}
      TZ: ${TZ:-America/Sao_Paulo}
    volumes:
      - iedc_albergue_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_ALBERGUE_USER:-iedc_albergue_app} -d ${POSTGRES_ALBERGUE_DB:-iedc_albergue}"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres-master:
    image: postgres:16-alpine
    container_name: iedc-postgres-master
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_MASTER_DB:-iedc_master}
      POSTGRES_USER: ${POSTGRES_MASTER_USER:-iedc_master_app}
      POSTGRES_PASSWORD: ${POSTGRES_MASTER_PASSWORD:-${POSTGRES_PASSWORD:?Defina POSTGRES_PASSWORD no .env}}
      TZ: ${TZ:-America/Sao_Paulo}
    volumes:
      - iedc_master_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_MASTER_USER:-iedc_master_app} -d ${POSTGRES_MASTER_DB:-iedc_master}"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres-escola:
    image: postgres:16-alpine
    container_name: iedc-postgres-escola
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_ESCOLA_DB:-iedc_escola}
      POSTGRES_USER: ${POSTGRES_ESCOLA_USER:-iedc_escola_app}
      POSTGRES_PASSWORD: ${POSTGRES_ESCOLA_PASSWORD:-${POSTGRES_PASSWORD:?Defina POSTGRES_PASSWORD no .env}}
      TZ: ${TZ:-America/Sao_Paulo}
    volumes:
      - iedc_escola_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_ESCOLA_USER:-iedc_escola_app} -d ${POSTGRES_ESCOLA_DB:-iedc_escola}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: iedc-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no", "--maxmemory", "64mb", "--maxmemory-policy", "allkeys-lru"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: iedc-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      postgres-albergue:
        condition: service_healthy
      postgres-master:
        condition: service_healthy
      postgres-escola:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      TZ: ${TZ:-America/Sao_Paulo}
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-iedc}
      DB_USER: ${POSTGRES_USER:-iedc_app}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?Defina POSTGRES_PASSWORD no .env}
      DB_ALBERGUE_HOST: postgres-albergue
      DB_ALBERGUE_PORT: 5432
      DB_ALBERGUE_NAME: ${POSTGRES_ALBERGUE_DB:-iedc_albergue}
      DB_ALBERGUE_USER: ${POSTGRES_ALBERGUE_USER:-iedc_albergue_app}
      DB_ALBERGUE_PASSWORD: ${POSTGRES_ALBERGUE_PASSWORD:?Defina POSTGRES_ALBERGUE_PASSWORD no .env}
      DB_MASTER_HOST: postgres-master
      DB_MASTER_PORT: 5432
      DB_MASTER_NAME: ${POSTGRES_MASTER_DB:-iedc_master}
      DB_MASTER_USER: ${POSTGRES_MASTER_USER:-iedc_master_app}
      DB_MASTER_PASSWORD: ${POSTGRES_MASTER_PASSWORD:-${POSTGRES_PASSWORD:?Defina POSTGRES_PASSWORD no .env}}
      DB_ESCOLA_HOST: postgres-escola
      DB_ESCOLA_PORT: 5432
      DB_ESCOLA_NAME: ${POSTGRES_ESCOLA_DB:-iedc_escola}
      DB_ESCOLA_USER: ${POSTGRES_ESCOLA_USER:-iedc_escola_app}
      DB_ESCOLA_PASSWORD: ${POSTGRES_ESCOLA_PASSWORD:-${POSTGRES_PASSWORD:?Defina POSTGRES_PASSWORD no .env}}
      DB_SYNCHRONIZE: ${DB_SYNCHRONIZE:-false}
      DB_MIGRATIONS_RUN: ${DB_MIGRATIONS_RUN:-true}
      DB_LOGGING: ${DB_LOGGING:-false}
      APP_VERSION: ${APP_VERSION:-v1-local}
      LOG_LEVEL: ${LOG_LEVEL:-log}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      LOG_INCLUDE_STACK: ${LOG_INCLUDE_STACK:-false}
      SLOW_REQUEST_MS: ${SLOW_REQUEST_MS:-500}
      VERY_SLOW_REQUEST_MS: ${VERY_SLOW_REQUEST_MS:-1000}
      BACKUP_ROOT: ${BACKUP_ROOT:-/var/backups/iedc}
      BACKUP_STATUS_PATH: ${BACKUP_STATUS_PATH:-/var/backups/iedc/backup-status.json}
      RESTORE_STATUS_PATH: ${RESTORE_STATUS_PATH:-/var/backups/iedc/restore-status.json}
      BACKUP_STALE_AFTER_HOURS: ${BACKUP_STALE_AFTER_HOURS:-30}
      JWT_SECRET: ${JWT_SECRET:?Defina JWT_SECRET no .env}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-12h}
      IEDC_DEFAULT_PASSWORD: ${IEDC_DEFAULT_PASSWORD:?Defina IEDC_DEFAULT_PASSWORD no .env}
      THROTTLE_DEFAULT_TTL_MS: ${THROTTLE_DEFAULT_TTL_MS:-60000}
      THROTTLE_DEFAULT_LIMIT: ${THROTTLE_DEFAULT_LIMIT:-120}
      THROTTLE_AUTH_TTL_MS: ${THROTTLE_AUTH_TTL_MS:-60000}
      THROTTLE_AUTH_LIMIT: ${THROTTLE_AUTH_LIMIT:-5}
      CORS_ORIGIN: ${CORS_ORIGIN:-}
      ENABLE_SWAGGER: ${ENABLE_SWAGGER:-false}
      ENABLE_DEMO_SEED: ${ENABLE_DEMO_SEED:-false}
      ENABLE_MAINTENANCE_ROUTES: ${ENABLE_MAINTENANCE_ROUTES:-false}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_GROUP_EQUIPE: ${TELEGRAM_GROUP_EQUIPE:-}
      TELEGRAM_GROUP_COORDENACAO: ${TELEGRAM_GROUP_COORDENACAO:-}
      TELEGRAM_GROUP_GERAL: ${TELEGRAM_GROUP_GERAL:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM: ${RESEND_FROM:-}
      TRIAGEM_EMAIL_DESTINATION: ${TRIAGEM_EMAIL_DESTINATION:-}
      TRIAGEM_NOTIFICATION_INCLUDE_PII: ${TRIAGEM_NOTIFICATION_INCLUDE_PII:-false}
    volumes:
      - iedc_uploads:/app/uploads
      - ${BACKUP_ROOT:-./.runtime/backups}:${BACKUP_ROOT:-/var/backups/iedc}:ro
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3001/api/health/ready').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  frontend:
    build:
      context: ./frontend
    container_name: iedc-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${APP_PORT:-80}:80"

volumes:
  iedc_postgres_data:
    name: iedc_postgres_data
  iedc_albergue_postgres_data:
    name: iedc_albergue_postgres_data
  iedc_master_postgres_data:
    name: iedc_master_postgres_data
  iedc_escola_postgres_data:
    name: iedc_escola_postgres_data
  iedc_uploads:
    name: iedc_uploads

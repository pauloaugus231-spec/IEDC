services:
  postgres:
    image: postgres:16-alpine
    container_name: iedc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-iedc}
      POSTGRES_USER: ${POSTGRES_USER:-iedc_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Defina POSTGRES_PASSWORD no .env}
      TZ: ${TZ:-America/Sao_Paulo}
    volumes:
      - iedc_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-iedc_app} -d ${POSTGRES_DB:-iedc}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: iedc-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no", "--maxmemory", "64mb", "--maxmemory-policy", "allkeys-lru"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: iedc-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      TZ: ${TZ:-America/Sao_Paulo}
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-iedc}
      DB_USER: ${POSTGRES_USER:-iedc_app}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?Defina POSTGRES_PASSWORD no .env}
      DB_SYNCHRONIZE: ${DB_SYNCHRONIZE:-false}
      DB_MIGRATIONS_RUN: ${DB_MIGRATIONS_RUN:-true}
      DB_LOGGING: ${DB_LOGGING:-false}
      JWT_SECRET: ${JWT_SECRET:?Defina JWT_SECRET no .env}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-12h}
      IEDC_DEFAULT_PASSWORD: ${IEDC_DEFAULT_PASSWORD:?Defina IEDC_DEFAULT_PASSWORD no .env}
      CORS_ORIGIN: ${CORS_ORIGIN:-}
      ENABLE_SWAGGER: ${ENABLE_SWAGGER:-false}
      ENABLE_DEMO_SEED: ${ENABLE_DEMO_SEED:-false}
      ENABLE_MAINTENANCE_ROUTES: ${ENABLE_MAINTENANCE_ROUTES:-false}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_GROUP_EQUIPE: ${TELEGRAM_GROUP_EQUIPE:-}
      TELEGRAM_GROUP_COORDENACAO: ${TELEGRAM_GROUP_COORDENACAO:-}
      TELEGRAM_GROUP_GERAL: ${TELEGRAM_GROUP_GERAL:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM: ${RESEND_FROM:-}
      TRIAGEM_EMAIL_DESTINATION: ${TRIAGEM_EMAIL_DESTINATION:-}
      TRIAGEM_NOTIFICATION_INCLUDE_PII: ${TRIAGEM_NOTIFICATION_INCLUDE_PII:-false}
    volumes:
      - iedc_uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3001/api/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  frontend:
    build:
      context: ./frontend
    container_name: iedc-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${APP_PORT:-80}:80"

volumes:
  iedc_postgres_data:
    name: iedc_postgres_data
  iedc_uploads:
    name: iedc_uploads

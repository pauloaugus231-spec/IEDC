name: Deploy IEDC

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-iedc-local-main
  cancel-in-progress: true

jobs:
  deploy-local:
    name: Atualizar Windows local
    runs-on: [self-hosted, windows, x64, iedc-local]

    env:
      DEPLOY_PROJECT_DIR: C:\dev\IEDC
      DEPLOY_BRANCH: main
      DEPLOY_REMOTE: origin
      DEPLOY_HEALTH_URL: http://127.0.0.1/api/health/ready

    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4

      - name: Atualizar sistema local
        shell: powershell
        run: |
          & "$env:GITHUB_WORKSPACE\ops\deploy\update-from-repository.ps1" `
            -ProjectDir $env:DEPLOY_PROJECT_DIR `
            -Branch $env:DEPLOY_BRANCH `
            -Remote $env:DEPLOY_REMOTE `
            -HealthUrl $env:DEPLOY_HEALTH_URL

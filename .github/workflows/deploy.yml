name: Deploy IEDC

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-iedc-local-main
  cancel-in-progress: true

jobs:
  deploy-local:
    name: Atualizar Windows local
    runs-on: [self-hosted, windows, x64, iedc-local]

    env:
      DEPLOY_PROJECT_DIR: C:\dev\IEDC
      DEPLOY_BRANCH: main
      DEPLOY_REMOTE: origin
      DEPLOY_HEALTH_URL: http://127.0.0.1:8080/api/health/ready

    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4

      - name: Atualizar sistema local
        shell: cmd
        run: |
          powershell.exe -NoLogo -NoProfile -ExecutionPolicy Bypass -File "%GITHUB_WORKSPACE%\ops\deploy\update-from-repository.ps1" ^
            -ProjectDir "%DEPLOY_PROJECT_DIR%" ^
            -Branch "%DEPLOY_BRANCH%" ^
            -Remote "%DEPLOY_REMOTE%" ^
            -HealthUrl "%DEPLOY_HEALTH_URL%"
